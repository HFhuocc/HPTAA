<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HPTA</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Roboto;
}

body{
background:#f1f5f9;
color:#0f172a;
transition:0.3s;
}

.container{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:linear-gradient(180deg,#2563eb,#3b82f6,#60a5fa);
color:white;
padding:25px 20px;
}

.logo{
font-size:24px;
font-weight:bold;
margin-bottom:30px;
text-align:center;
}

.menu{
display:flex;
flex-direction:column;
gap:10px;
}

.menu div{
padding:12px;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

.menu div:hover{
background:rgba(255,255,255,0.2);
}

/* MAIN */

.main{
flex:1;
padding:40px;
}

.topbar{
display:flex;
justify-content:flex-end;
gap:20px;
align-items:center;
margin-bottom:40px;
}

.themebtn{
background:#2563eb;
border:none;
color:white;
padding:10px 18px;
border-radius:12px;
cursor:pointer;
}

/* HOME */

.home h1{
font-size:36px;
margin-bottom:10px;
}

.home p{
color:#475569;
margin-bottom:30px;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
font-size:18px;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:translateY(-5px);
}

/* DARK MODE */

.dark{
background:#0f172a;
color:white;
}

.dark .card{
background:#1e293b;
color:white;
}

.dark .sidebar{
background:linear-gradient(180deg,#1e293b,#334155);
}

/* MOBILE */

@media(max-width:768px){

.container{
flex-direction:column;
}

.sidebar{
width:100%;
}

.menu{
flex-direction:row;
flex-wrap:wrap;
justify-content:center;
}

.main{
padding:20px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="sidebar">

<div class="logo">HPTA</div>

<div class="menu">

<div>🌍 Địa Lí</div>
<div>📜 Lịch Sử</div>
<div>➗ Toán</div>
<div>📖 Ngữ Văn</div>
<div>🎨 Photoshop</div>
<div onclick="openForm()">📤 Gửi Tài Liệu</div>

</div>

</div>

<div class="main">

<div class="topbar">

<div>
<div id="date"></div>
<div id="clock"></div>
</div>

<button class="themebtn" onclick="toggleDark()" id="themebtn">
🦀 Sáng
</button>

</div>

<div class="home">

<h1>HPTA</h1>
<p>Trang Web Tài Liệu & Ôn Tập</p>

<div class="cards">

<div class="card">🌍 Địa Lí</div>
<div class="card">📜 Lịch Sử</div>
<div class="card">➗ Toán</div>
<div class="card">📖 Ngữ Văn</div>
<div class="card">🎨 Photoshop</div>
<div class="card" onclick="openForm()">📤 Gửi Tài Liệu</div>

</div>

</div>

</div>

</div>

<script>

function openForm(){
window.open("https://forms.gle/VcCM1YBt7nNfhRhbA","_blank")
}

function toggleDark(){

document.body.classList.toggle("dark")

let btn=document.getElementById("themebtn")

if(document.body.classList.contains("dark")){
btn.innerText="🐼 Tối"
}else{
btn.innerText="🦀 Sáng"
}

}

function updateClock(){

let now=new Date()

let h=String(now.getHours()).padStart(2,"0")
let m=String(now.getMinutes()).padStart(2,"0")
let s=String(now.getSeconds()).padStart(2,"0")

document.getElementById("clock").innerText=h+":"+m+":"+s

let d=now.getDate()
let mo=now.getMonth()+1
let y=now.getFullYear()

document.getElementById("date").innerText=d+"/"+mo+"/"+y

}

setInterval(updateClock,1000)

</script>

</body>
</html>
